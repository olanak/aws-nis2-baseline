name: terraform-docs

on:
  push:
    branches: [main]
    paths:
      - 'modules/**/*.tf'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate module READMEs
        uses: terraform-docs/gh-actions@v1
        with:
          find-dir: modules/
          recursive: "true"
          recursive-path: .
          output-file: README.md
          output-method: inject
          git-push: "false"

      - name: Fix workspace ownership after terraform-docs container
        run: sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE"

      - name: Open PR with updated module docs
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DOCS_PAT }}
          commit-message: "docs: auto-update module READMEs"
          title: "docs: auto-update module READMEs"
          body: |
            Automated update of module READMEs by terraform-docs.

            Reviewed by CI. Safe to merge if all checks pass.
          branch: bot/terraform-docs
          delete-branch: true
          add-paths: modules/**/README.md