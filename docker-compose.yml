services:
  localstack:
    container_name: nis2-localstack
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,kms,iam,sts,cloudtrail,config,logs,ec2,events,sns,guardduty
      - DEFAULT_REGION=eu-central-1
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - "./volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"