services:
  localstack:
    container_name: nis2-localstack
    image: localstack/localstack-pro:4.4.0   # ← was localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}   # ← new
      - DEFAULT_REGION=eu-central-1
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - "./volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"